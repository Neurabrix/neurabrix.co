<!doctype html>

<head>

  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5d6872;
      --line: #d9e1e8;
      --surface: #ffffff;
      --wash: #f6f8fa;
      --blue: #1264a3;
      --green: #16745f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--wash);
      line-height: 1.5;
    }

    header, main {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
    }

    header { padding: 48px 0 28px; }

    .eyebrow {
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lede {
      max-width: 760px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      padding-bottom: 48px;
    }

    .feature {
      display: block;
      min-height: 190px;
      padding: 22px;
      color: inherit;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(23, 32, 38, 0.07);
    }

    .feature:hover {
      border-color: rgba(18, 100, 163, 0.42);
      transform: translateY(-1px);
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--blue);
      background: #eaf3fb;
      font-weight: 700;
      font-size: 0.82rem;
    }

    h2 {
      margin: 18px 0 8px;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    p { margin: 0; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">ClinicOS docs 4a27e4615569</div>
    <h1>Product version 4a27e4615569</h1>

  </header>
  <main>
    <section class="grid" aria-label="ClinicOS product docs for commit 4a27e4615569">
      <a class="feature" href="/docs/clinicos/4a27e4615569a6e6d480489bf178f2179f0dad13/doctor/dashboard/">
